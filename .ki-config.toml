# Knowledge Islands repo config — read by the knowledgeislands-repo skill.
# One [table] per skill that needs per-repo options.
[knowledgeislands-repo]
visibility = "private"   # "public" | "private"
# This repo fully conforms, so it declares no check overrides. To diverge, add a
# [knowledgeislands-repo.checks] table with one boolean per check (true = enforce).

# Read by the knowledgeislands-engineering skill (the common build/lint/test toolchain).
[knowledgeislands-engineering]
# This repo fully conforms, so it declares no check overrides. To diverge, add a
# [knowledgeislands-engineering.checks] table with one boolean per check (true = enforce).

# This repo IS a Knowledge Islands agentic harness (the four-part skills/ agents/ mcp/ evals/
# layout), so it declares governance by the knowledgeislands-harness standard. Presence of this
# table is the compliance marker; no per-harness keys are defined yet.
[knowledgeislands-harness]

# This repo ships skills under skills/, so it declares governance by the knowledgeislands-skills
# standard. (Read by knowledgeislands-repo's coverage check; the skills linter lints the SKILL.md
# files themselves.)
[knowledgeislands-skills]

# This repo ships the knowledgeislands-decision-records skill, so it declares governance by its own standard.
[knowledgeislands-decision-records]

# Tokenomics governance — audits the standing context surface for this environment.
# MCP server count is user-scoped (not harness-controlled); all 19 are intentional.
# With Claude Code's default tool search (ENABLE_TOOL_SEARCH=auto), schemas are deferred,
# so the real standing cost is lower than the raw count implies. The raised budget documents
# the acknowledged state; the WARN is there to revisit when the global MCP set is pruned.
[knowledgeislands-tokenomics]
headroom = "recommended"
preferred_model = "sonnet"

[knowledgeislands-tokenomics.budgets]
mcp_servers = 20   # 19 user-scoped at time of first audit (2026-06-22); revisit when scoped
