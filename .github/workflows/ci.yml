name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the toolchain from mise.toml (pins node + bun); no version is
      # hardcoded here — mise.toml is the single source of truth.
      - uses: jdx/mise-action@v4

      - run: bun install --frozen-lockfile

      # The aggregate read-only gate: fans out over every vendored per-skill audit in
      # .ki-meta (engineering runs the code toolchain — biome + tsc + knip + syncpack;
      # authoring runs the Markdown gate; the governance skills run their standards).
      # The composed verify gate is retired — ki:audit IS the gate (ADR-KI-HARNESS-TOOLCHAIN-001).
      - name: Audit
        run: bun run ki:audit

      # The harness self-test suite (checker *.test.ts + generated-artifact + bootstrap
      # integrity). The GitHub-gated repo audit is omitted (needs gh auth; run locally).
      - name: Test
        run: bun run test
